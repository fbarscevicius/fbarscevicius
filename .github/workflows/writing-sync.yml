name: writing sync

# Pulls the latest essays from the anvilwright RSS feed into the README,
# between the BLOG-POST-LIST markers. Runs daily and on demand.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://anvilwright.com/rss.xml"
          max_post_count: 5
          # dateformat tokens: lowercase mm is month, capital MM is minutes.
          date_format: "yyyy-mm-dd"
          template: "- [$title]($url) <sub>$date</sub>$newline"
          commit_message: "sync writing list from feed"
